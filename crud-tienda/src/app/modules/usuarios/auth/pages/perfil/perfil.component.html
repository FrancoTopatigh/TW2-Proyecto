<div class="d-flex align-items-center justify-content-center p-2 p-sm-4 p-md-5" style="min-height: 100vh; background-color: var(--bs-light);">
  <div class="form-container w-100">
    <div class="card shadow border-0 p-3 p-sm-4">
      <div class="card-body">
        <h3 class="card-title text-center mb-4 fw-bold text-dark">Mi Perfil</h3>

        @if (authService.currentUser(); as user) {
          <div class="mb-3">
            <p class="text-muted small mb-1 text-uppercase fw-semibold">Nombre</p>
            <p class="fs-5 fw-medium mb-0">{{ user.nombre }} {{ user.apellido }}</p>
          </div>
          <div class="mb-3">
            <p class="text-muted small mb-1 text-uppercase fw-semibold">Correo Electrónico</p>
            <p class="fs-5 fw-medium mb-0">{{ user.email }}</p>
          </div>
          <div class="mb-4">
            <p class="text-muted small mb-1 text-uppercase fw-semibold">Dirección</p>
            <p class="fs-5 fw-medium mb-0">{{ user.direccion }}</p>
          </div>

          <button type="button" class="btn btn-danger w-100 py-2 fw-semibold shadow-sm rounded-pill" (click)="logout()">
            Cerrar Sesión
          </button>
        } @else {
          <div class="text-center py-4">
            <span class="spinner-border text-primary" role="status"></span>
            <p class="text-muted mt-3 mb-0">Cargando...</p>
          </div>
        }
      </div>
    </div>
  </div>
</div>
