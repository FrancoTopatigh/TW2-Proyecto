@if (productoActual()) {
  <app-producto-form
    modo="edit"
    [datosIniciales]="productoActual()"
    (onGuardar)="editarProducto($event)">
  </app-producto-form>
} @else {
  <div class="text-center my-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Cargando producto...</span>
    </div>
  </div>
}
