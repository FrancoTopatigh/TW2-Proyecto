<div class="container my-5 flex-grow-1">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">

      <div class="card shadow border rounded-3 p-4 p-sm-5 bg-white">

        <div class="text-center mb-4">
          <h2 class="fw-bold text-dark">Modificar Producto</h2>
          <p class="text-muted small">Editá las propiedades del artículo seleccionado para actualizar la tienda.</p>
        </div>

        <form #formEditar="ngForm" (ngSubmit)="editarProducto(formEditar.value)">

          <div class="mb-3">
            <label for="nombre" class="form-label fw-semibold text-secondary">Nombre del Producto</label>
            <input
              type="text"
              id="nombre"
              name="nombre"
              [(ngModel)]="productoActual.nombre"
              required
              placeholder="Ej: Camiseta Oficial Titular"
              class="form-control form-control-lg rounded-3 fs-6"
            >
          </div>

          <div class="mb-3">
            <label for="clasificacion" class="form-label fw-semibold text-secondary">Clasificación / Categoría</label>
            <select
              id="clasificacion"
              name="clasificacion"
              [(ngModel)]="productoActual.clasificacion"
              required
              class="form-select form-control-lg rounded-3 fs-6 text-capitalize"
            >
              <option value="" disabled>Elegí una categoría</option>
              <option value="pelotas">Pelotas</option>
              <option value="conjuntos">Conjuntos</option>
              <option value="botines">Botines</option>
            </select>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-12 col-sm-6">
              <label for="precio" class="form-label fw-semibold text-secondary">Precio ($)</label>
              <input
                type="number"
                id="precio"
                name="precio"
                [(ngModel)]="productoActual.precio"
                required
                min="1"
                placeholder="0.00"
                class="form-control form-control-lg rounded-3 fs-6"
              >
            </div>
            <div class="col-12 col-sm-6">
              <label for="stock" class="form-label fw-semibold text-secondary">Stock Disponible</label>
              <input
                type="number"
                id="stock"
                name="stock"
                [(ngModel)]="productoActual.stock"
                required
                min="0"
                placeholder="Unidades"
                class="form-control form-control-lg rounded-3 fs-6"
              >
            </div>
          </div>

          <div class="mb-4">
            <label for="descripcion" class="form-label fw-semibold text-secondary">Descripción del Artículo</label>
            <textarea
              id="descripcion"
              name="descripcion"
              rows="3"
              [(ngModel)]="productoActual.descripcion"
              required
              placeholder="Describí las características principales..."
              class="form-control rounded-3 fs-6"
            ></textarea>
          </div>

          <div class="d-flex flex-column-reverse flex-sm-row justify-content-sm-end gap-2 pt-3 border-top">
            <a routerLink="/productos/list-productos" class="btn btn-outline-secondary px-4 py-2 rounded-3 fw-semibold">
              Cancelar
            </a>
            <button
              type="submit"
              [disabled]="formEditar.invalid"
              class="btn btn-primary px-4 py-2 rounded-3 fw-bold shadow-sm"
            >
              Guardar Cambios
            </button>
          </div>

        </form>

      </div>

    </div>
  </div>
</div>
